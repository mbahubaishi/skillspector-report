name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Ruff, Bandit, pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff bandit pip-audit

      - name: Ruff
        run: ruff check .

      - name: Bandit
        run: bandit -r src --severity-level medium

      - name: pip-audit
        run: pip-audit
